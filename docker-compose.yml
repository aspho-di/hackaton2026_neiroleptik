services:
  db:
    image: postgres:15-alpine
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-user}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-password}
      - POSTGRES_DB=${POSTGRES_DB:-agro}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./agro-backend/migrations/001_init.sql:/docker-entrypoint-initdb.d/001_init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-user} -d ${POSTGRES_DB:-agro}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - agro-network
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - agro-network
    restart: unless-stopped

  ml-yield:
    build:
      context: ./ml-yield
      dockerfile: Dockerfile
    ports:
      - "8001:8001"
    networks:
      - agro-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  ml-irrigation:
    build:
      context: ./ml-irrigation
      dockerfile: Dockerfile
    ports:
      - "8002:8002"
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-user}:${POSTGRES_PASSWORD:-password}@db:5432/${POSTGRES_DB:-agro}
      - FORECAST_SERVICE_URL=http://ml-yield:8001/predict/forecast
    depends_on:
      db:
        condition: service_healthy
    networks:
      - agro-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8002/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  backend:
    build:
      context: ./agro-backend
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgres://${POSTGRES_USER:-user}:${POSTGRES_PASSWORD:-password}@db:5432/${POSTGRES_DB:-agro}?sslmode=disable
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - ML_SERVICE_1_URL=http://ml-yield:8001
      - ML_SERVICE_2_URL=http://ml-irrigation:8002
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - agro-network
    restart: unless-stopped

volumes:
  pgdata:

networks:
  agro-network:
    driver: bridge
